<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>AI-PG | Connexion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div id="loginCard" class="card">
    <h2>Connexion</h2>

    <input type="email" id="loginEmail" placeholder="Adresse mail">
    <input type="password" id="loginPassword" placeholder="Mot de passe">

    <button onclick="login()">Se connecter</button>

    <p class="switch">
      Vous n'avez pas encore de compte AI-PG ?
      <span onclick="showRegister()">Créer un compte</span>
    </p>
  </div>

  <div id="registerCard" class="card hidden">
    <h2>Créer un compte</h2>

    <input type="email" id="registerEmail" placeholder="Adresse mail">
    <input type="password" id="registerPassword" placeholder="Mot de passe">

    <button onclick="register()">Créer le compte</button>

    <p class="switch">
      Déjà un compte ?
      <span onclick="showLogin()">Se connecter</span>
    </p>
  </div>

  <div id="appCard" class="card hidden">
    <h2>Générer un email</h2>

    <input type="text" id="name" placeholder="Nom du prospect">
    <input type="text" id="company" placeholder="Entreprise">
    <input type="text" id="painPoint" placeholder="Problématique">

    <h3>Signature (optionnel)</h3>
    <input type="text" id="senderName" placeholder="Votre nom">
    <input type="text" id="senderCompany" placeholder="Votre entreprise">
    <input type="text" id="senderPhone" placeholder="Votre téléphone">

    <button onclick="generate()">Générer</button>

    <pre id="result"></pre>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
