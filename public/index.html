<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>AI-PG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- LEFT COLUMN -->
  <div class="left-panel">

    <div class="card">
      <h2>Informations prospect</h2>

      <input type="text" id="name" placeholder="Nom du prospect">
      <input type="text" id="company" placeholder="Entreprise">

      <h3>Signature (optionnel)</h3>
      <input type="text" id="senderName" placeholder="Votre nom">
      <input type="text" id="senderCompany" placeholder="Votre entreprise">
      <input type="text" id="senderPhone" placeholder="Votre téléphone">

      <button onclick="generate()">Générer</button>
    </div>

  </div>

  <!-- RIGHT COLUMN -->
  <div class="right-panel">

    <div class="result-card">
      <h2>Email généré</h2>
      <pre id="result">Votre email apparaîtra ici...</pre>
    </div>

    <div class="card problem-card">
      <h3>Problématique principale</h3>
      <input type="text" id="painPoint" placeholder="Décrivez la problématique principale">

      <h3>Leviers potentiels (optionnel)</h3>
      <div id="levers-container"></div>

      <button class="secondary" onclick="addLever()">+ Ajouter un levier</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
